services:
  postgres:
    image: postgres:16-alpine
    container_name: sparient-postgres
    environment:
      POSTGRES_USER: sparient
      POSTGRES_PASSWORD: sparient
      POSTGRES_DB: sparient
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparient -d sparient"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
