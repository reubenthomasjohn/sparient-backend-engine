name: Deploy (single env)

on:
  # push:
  #   branches: [slim/repo]
  workflow_dispatch: {} # manual trigger from the Actions tab

permissions:
  id-token: write # required to request OIDC token from GitHub → AWS
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPO_NAME: sparient-monolith
  LAMBDA_NAME: sparient-single
  # Set this once in the repo's Actions > Variables:
  #   AWS_ROLE_ARN  = terraform output -raw github_actions_role_arn
  #   AWS_ACCOUNT_ID = 882884689403

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx (arm64)
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        env:
          ECR_URI: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_NAME }}
        run: |
          docker buildx build \
            -f Dockerfile.lambda \
            --platform linux/arm64 \
            --build-arg LAMBDA_ENTRY=workers/monolith/lambda \
            -t $ECR_URI:${{ github.sha }} \
            -t $ECR_URI:latest \
            --push .

      - name: Update Lambda to new image
        env:
          ECR_URI: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_NAME \
            --image-uri $ECR_URI:${{ github.sha }} \
            --publish

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated --function-name $LAMBDA_NAME
          echo "Deployed ${{ github.sha }} to $LAMBDA_NAME"
