name: Deploy (dev)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'terraform/**'
      - 'Dockerfile.lambda'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2

  # Set in repo → Settings → Secrets and variables → Actions:
  #
  # Variables:
  #   AWS_ACCOUNT_ID   = 882884689403
  #   AWS_ROLE_ARN_DEV = (terraform output -raw github_actions_role_arn)
  #
  # Secrets:
  #   NEON_API_KEY     = napi_...

jobs:
  # 1. Terraform
  terraform:
    runs-on: ubuntu-latest
    outputs:
      ecr_api:             ${{ steps.ecr.outputs.api }}
      ecr_discovery:       ${{ steps.ecr.outputs.discovery }}
      ecr_course_workflow: ${{ steps.ecr.outputs.course_workflow }}
      ecr_responses:       ${{ steps.ecr.outputs.responses }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/envs/dev
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: terraform/envs/dev
        env:
          TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
        run: terraform apply -auto-approve -input=false -var="use_aws_profile=false"

      - name: Export ECR repo URLs
        id: ecr
        working-directory: terraform/envs/dev
        run: |
          echo "api=$(terraform output -json ecr_repo_urls | jq -r '.["sparient-api"]')" >> "$GITHUB_OUTPUT"
          echo "discovery=$(terraform output -json ecr_repo_urls | jq -r '.["sparient-discovery"]')" >> "$GITHUB_OUTPUT"
          echo "course_workflow=$(terraform output -json ecr_repo_urls | jq -r '.["sparient-course-workflow"]')" >> "$GITHUB_OUTPUT"
          echo "responses=$(terraform output -json ecr_repo_urls | jq -r '.["sparient-responses"]')" >> "$GITHUB_OUTPUT"

  # 2. Prisma migrations
  migrate:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/envs/dev
        run: terraform init -input=false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        working-directory: terraform/envs/dev
        env:
          TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
        run: |
          DATABASE_URL=$(terraform output -raw neon_connection_uri)
          echo "::add-mask::$DATABASE_URL"
          export DATABASE_URL
          cd ../../..
          npx prisma migrate deploy

  # 3. Build images (4 Lambdas)
  build:
    needs: [terraform, migrate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            entry: workers/api/lambda
            ecr_output: ecr_api
          - name: discovery
            entry: workers/discovery/lambda
            ecr_output: ecr_discovery
          - name: course-workflow
            entry: workers/course/lambda
            ecr_output: ecr_course_workflow
          - name: responses
            entry: workers/responses/lambda
            ecr_output: ecr_responses
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push
        env:
          ECR_URI: ${{ needs.terraform.outputs[matrix.ecr_output] }}
        run: |
          docker build \
            -f Dockerfile.lambda \
            --build-arg LAMBDA_ENTRY=${{ matrix.entry }} \
            -t $ECR_URI:${{ github.sha }} \
            -t $ECR_URI:latest .
          docker push $ECR_URI:${{ github.sha }}
          docker push $ECR_URI:latest

  # 4. Update Lambdas
  deploy:
    needs: [terraform, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - function: sparient-dev-api
            ecr_output: ecr_api
          - function: sparient-dev-discovery
            ecr_output: ecr_discovery
          - function: sparient-dev-course-workflow
            ecr_output: ecr_course_workflow
          - function: sparient-dev-responses
            ecr_output: ecr_responses
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Update Lambda
        env:
          ECR_URI: ${{ needs.terraform.outputs[matrix.ecr_output] }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.function }} \
            --image-uri $ECR_URI:${{ github.sha }} \
            --publish

      - name: Wait for update
        run: aws lambda wait function-updated --function-name ${{ matrix.function }}
